name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact_name: electrs
            platform: x86_64-linux-gnu
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact_name: electrs
            platform: aarch64-linux-gnu
          - target: aarch64-apple-darwin
            runner: macos-14
            artifact_name: electrs
            platform: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --locked

      - name: Strip binary
        run: strip target/release/${{ matrix.artifact_name }}

      - name: Create tarball
        env:
          ASSET_NAME: electrs-${{ steps.version.outputs.tag }}-${{ matrix.platform }}
        run: |
          cd target/release
          tar czvf ${ASSET_NAME}.tar.gz ${{ matrix.artifact_name }}

      - name: Compute SHA256 (Linux)
        if: runner.os == 'Linux'
        env:
          ASSET_NAME: electrs-${{ steps.version.outputs.tag }}-${{ matrix.platform }}
        run: |
          cd target/release
          sha256sum ${ASSET_NAME}.tar.gz > ${ASSET_NAME}.tar.gz.sha256

      - name: Compute SHA256 (macOS)
        if: runner.os == 'macOS'
        env:
          ASSET_NAME: electrs-${{ steps.version.outputs.tag }}-${{ matrix.platform }}
        run: |
          cd target/release
          shasum -a 256 ${ASSET_NAME}.tar.gz > ${ASSET_NAME}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electrs-${{ steps.version.outputs.tag }}-${{ matrix.platform }}
          path: |
            target/release/electrs-${{ steps.version.outputs.tag }}-${{ matrix.platform }}.tar.gz
            target/release/electrs-${{ steps.version.outputs.tag }}-${{ matrix.platform }}.tar.gz.sha256

  publish-crate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256