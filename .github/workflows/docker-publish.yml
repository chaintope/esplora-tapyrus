name: Docker Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: true
        type: string

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    if: github.repository == 'chaintope/esplora-tapyrus'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: tapyrus/esplora-tapyrus:${{ steps.meta.outputs.tag }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.suffix }},mode=max

  merge-manifests:
    needs: build
    runs-on: ubuntu-latest
    if: github.repository == 'chaintope/esplora-tapyrus'

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create and push manifest
        run: |
          docker manifest create tapyrus/esplora-tapyrus:${{ steps.meta.outputs.tag }} \
            tapyrus/esplora-tapyrus:${{ steps.meta.outputs.tag }}-amd64 \
            tapyrus/esplora-tapyrus:${{ steps.meta.outputs.tag }}-arm64
          docker manifest push tapyrus/esplora-tapyrus:${{ steps.meta.outputs.tag }}

          docker manifest create tapyrus/esplora-tapyrus:latest \
            tapyrus/esplora-tapyrus:${{ steps.meta.outputs.tag }}-amd64 \
            tapyrus/esplora-tapyrus:${{ steps.meta.outputs.tag }}-arm64
          docker manifest push tapyrus/esplora-tapyrus:latest
